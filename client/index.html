<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GONET · netcode scope</title>
  <style>
    :root {
      --scope: #0A0F14; --panel: #0F1620; --grid: #1C2A35; --hair: #223040;
      --ink: #C9D6DF; --dim: #5E7385;
      --you: #2EE6C0; --srv: #FFB454; --rem: #6E8BFF;
      --mono: ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; padding: 28px 20px;
      background: radial-gradient(120% 80% at 50% -15%, #122230 0%, #0A0F14 58%);
      color: var(--ink); font-family: var(--mono);
      font-variant-numeric: tabular-nums;
      display: grid; place-items: center;
      -webkit-font-smoothing: antialiased;
    }
    .instrument {
      width: 100%; max-width: 1160px;
      border: 1px solid var(--hair); border-radius: 8px;
      background: linear-gradient(180deg, #0E151D, #0A0F14);
      box-shadow: 0 30px 80px -40px #000, inset 0 1px 0 #1b2733;
    }

    /* ── header ─────────────────────────────────────────── */
    .head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      padding: 14px 18px; border-bottom: 1px solid var(--hair);
    }
    .brand { font-size: 17px; font-weight: 700; letter-spacing: .26em; }
    .brand .unit { color: var(--you); font-weight: 500; font-size: 11px; letter-spacing: .1em; margin-left: 2px; }
    .score { font-size: 12px; letter-spacing: .18em; color: var(--dim); }
    .score b { font-size: 15px; font-weight: 700; letter-spacing: 0; margin: 0 4px; }
    .score .sc-you { color: var(--you); }
    .score .sc-opp { color: var(--srv); }
    .score .dash { margin: 0 8px; color: var(--hair); }
    .status { display: flex; align-items: center; gap: 8px; font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); }
    .led { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
    .led.on { background: var(--you); animation: pulse 2.2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46,230,192,.45); } 70% { box-shadow: 0 0 0 7px rgba(46,230,192,0); } 100% { box-shadow: 0 0 0 0 rgba(46,230,192,0); } }
    .status .sep { color: var(--hair); }

    /* ── stage: scope + telemetry ───────────────────────── */
    .stage { display: grid; grid-template-columns: minmax(0,1fr) 250px; gap: 16px; padding: 16px; }
    .scope-wrap { position: relative; }
    canvas {
      display: block; width: 100%; height: auto; aspect-ratio: 1000 / 600;
      background: var(--scope); border: 1px solid var(--grid); border-radius: 4px;
    }
    .tick { position: absolute; width: 11px; height: 11px; pointer-events: none; }
    .tick.tl { top: -4px; left: -4px; border-top: 1px solid var(--you); border-left: 1px solid var(--you); }
    .tick.tr { top: -4px; right: -4px; border-top: 1px solid var(--you); border-right: 1px solid var(--you); }
    .tick.bl { bottom: -4px; left: -4px; border-bottom: 1px solid var(--you); border-left: 1px solid var(--you); }
    .tick.br { bottom: -4px; right: -4px; border-bottom: 1px solid var(--you); border-right: 1px solid var(--you); }
    .overlay {
      position: absolute; inset: 1px; display: grid; place-content: center; gap: 6px; text-align: center;
      background: rgba(10,15,20,.62); border-radius: 4px;
    }
    .overlay[hidden] { display: none; }
    .overlay .ok { font-size: 13px; letter-spacing: .35em; color: var(--srv); }
    .overlay .ov { font-size: 11px; letter-spacing: .12em; color: var(--dim); }

    /* ── telemetry panel ────────────────────────────────── */
    .panel { border: 1px solid var(--hair); border-radius: 5px; background: var(--panel); padding: 12px; }
    .panel-h { font-size: 9.5px; letter-spacing: .3em; color: var(--dim); padding-bottom: 8px; margin-bottom: 10px; border-bottom: 1px solid var(--hair); }
    .panel-h + .panel-h { margin-top: 16px; }
    .readouts { display: grid; grid-template-columns: 1fr; gap: 15px; }
    .cell { display: flex; flex-direction: column; gap: 3px; }
    .cell .k { font-size: 9px; letter-spacing: .16em; color: var(--dim); }
    .cell .v { display: flex; align-items: baseline; gap: 4px; }
    .cell .v i { font-style: normal; font-size: 21px; font-weight: 600; line-height: 1; color: var(--ink); }
    .cell .v em { font-style: normal; font-size: 9.5px; color: var(--dim); }
    .chan { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 10.5px; color: var(--dim); }
    .chan b { color: var(--ink); font-weight: 600; }
    .legend { display: flex; flex-direction: column; gap: 7px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--hair); }
    .lg { display: flex; align-items: center; gap: 8px; font-size: 10.5px; color: var(--dim); }
    .sw { width: 9px; height: 9px; border-radius: 50%; }
    .sw.you { background: var(--you); }
    .sw.srv { background: transparent; border: 1.5px solid var(--srv); }
    .sw.rem { background: var(--rem); }

    /* ── footer ─────────────────────────────────────────── */
    .foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
      padding: 11px 18px; border-top: 1px solid var(--hair); font-size: 10.5px; color: var(--dim); letter-spacing: .04em; }
    .foot code { color: var(--you); background: #0c1118; border: 1px solid var(--hair); border-radius: 3px; padding: 1px 5px; }

    :focus-visible { outline: 2px solid var(--you); outline-offset: 2px; }

    @media (max-width: 760px) {
      .stage { grid-template-columns: 1fr; }
      .readouts { grid-template-columns: repeat(3, 1fr); }
      .legend { flex-direction: row; flex-wrap: wrap; gap: 6px 16px; }
    }
    @media (prefers-reduced-motion: reduce) { .led.on { animation: none; } }
  </style>
</head>
<body>
  <div class="instrument">
    <header class="head">
      <div class="brand">GONET<span class="unit">/20Hz</span></div>
      <div class="score">YOU<b class="sc-you" id="sc-you">0</b><span class="dash">—</span>OPP<b class="sc-opp" id="sc-opp">0</b></div>
      <div class="status"><span class="led" id="led"></span><span id="conn">connecting</span></div>
    </header>

    <main class="stage">
      <div class="scope-wrap">
        <span class="tick tl"></span><span class="tick tr"></span><span class="tick bl"></span><span class="tick br"></span>
        <canvas id="game" width="1000" height="600"></canvas>
        <div class="overlay" id="overlay" hidden>
          <div class="ok">SIGNAL LOST</div>
          <div class="ov" id="overlay-sub">reacquiring</div>
        </div>
      </div>

      <aside class="panel">
        <div class="panel-h">TELEMETRY</div>
        <div class="readouts">
          <div class="cell"><span class="k">RTT</span><span class="v"><i id="t-rtt">—</i><em>ms</em></span></div>
          <div class="cell"><span class="k">DRIFT</span><span class="v"><i id="t-drift">—</i><em>px</em></span></div>
          <div class="cell"><span class="k">CORR</span><span class="v"><i id="t-corr">—</i><em>px</em></span></div>
        </div>
        <div class="panel-h" id="chan-h" hidden>CHANNEL</div>
        <div class="chan" id="chan" hidden><span>lag <b id="c-lag">0</b>ms</span><span>jitter <b id="c-jit">0</b>ms</span><span>buf <b id="c-buf">0</b></span></div>
        <div class="legend">
          <span class="lg"><i class="sw you"></i>predicted · you</span>
          <span class="lg"><i class="sw srv"></i>server truth</span>
          <span class="lg"><i class="sw rem"></i>remote · interpolated</span>
        </div>
      </aside>
    </main>

    <footer class="foot">
      <span>arrow keys to move · charge into your opponent to drain them</span>
      <span>append <code>?lag=200</code> or <code>?jitter=100</code> to watch the netcode work</span>
    </footer>
  </div>

  <script type="module">
    import { encode, decode } from "./msgpack.js";

    // Physics constants — must match the server exactly, or prediction drifts.
    const SPEED = 200, TICK_MS = 50, DT = TICK_MS / 1000;
    const ARENA_W = 1000, ARENA_H = 600, RADIUS = 10;
    const clamp = (v, lo, hi) => (v < lo ? lo : v > hi ? hi : v);

    // ?lag=200 injects one-way send latency; ?jitter=100 randomizes it.
    const params = new URLSearchParams(location.search);
    const LAG_MS = Number(params.get("lag")) || 0;
    const JITTER_MS = Number(params.get("jitter")) || 0;
    const INTERP_DELAY = 150; // render remotes this far in the past, between snapshots

    const COL = { scope: "#0A0F14", grid: "#152029", gridMaj: "#1C2A35", you: "#2EE6C0", srv: "#FFB454", rem: "#6E8BFF", dim: "#5E7385" };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const $ = (id) => document.getElementById(id);
    const ui = {
      scYou: $("sc-you"), scOpp: $("sc-opp"), conn: $("conn"), led: $("led"),
      rtt: $("t-rtt"), drift: $("t-drift"), corr: $("t-corr"),
      buf: $("c-buf"), overlay: $("overlay"), overlaySub: $("overlay-sub"),
    };
    $("c-lag").textContent = LAG_MS;
    $("c-jit").textContent = JITTER_MS;
    if (LAG_MS || JITTER_MS) { $("chan").hidden = false; $("chan-h").hidden = false; }

    let myId = null;            // our own player id, learned from the welcome message
    let localState = null;      // predicted position of our player
    let seq_counter = 1;        // starts at 1 so server AckSeq=0 means "nothing acked"
    let lastServerTick = 0;
    let lastAppliedTick = 0;    // newest snapshot reconciled against; drops stale ones
    let lastCorrection = 0;     // size of the last reconciliation snap (for the HUD)
    let rttEma = 0;             // smoothed round-trip time
    const pending = new Map();  // seq -> {dx, dy}, replayed during reconciliation
    const sentAt = new Map();   // seq -> send time, for RTT measurement
    const world = {};           // id -> authoritative player state from snapshots
    const history = {};         // id -> [{t, x, y, vx, vy}] samples for interpolation

    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.binaryType = "arraybuffer";
    ws.onopen = () => { ui.conn.textContent = "live"; ui.led.classList.add("on"); };
    ws.onclose = () => { ui.conn.textContent = "offline"; ui.led.classList.remove("on"); };
    ws.onerror = () => { ui.conn.textContent = "error"; };

    ws.onmessage = (event) => {
      const msg = decode(new Uint8Array(event.data));
      if (msg.you !== undefined) { myId = msg.you; return; }

      if (msg.tick_id !== undefined) lastServerTick = msg.tick_id;
      const now = performance.now();
      for (const pd of msg.players || []) {
        const p = world[pd.id] = Object.assign(world[pd.id] || {}, pd);
        recordSample(pd.id, p, now);
      }
      for (const id of msg.removed || []) { delete world[id]; delete history[id]; }

      const me = world[myId];
      if (me && msg.tick_id > lastAppliedTick) {
        lastAppliedTick = msg.tick_id;
        updateRtt(me.ackseq, now);
        reconcile(me);
      }
    };

    function recordSample(id, p, t) {
      const buf = history[id] || (history[id] = []);
      buf.push({ t, x: p.x, y: p.y, vx: p.vx || 0, vy: p.vy || 0 });
      while (buf.length > 2 && buf[1].t < t - 1000) buf.shift(); // keep ~1s of history
    }

    function updateRtt(ackseq, now) {
      const sent = sentAt.get(ackseq);
      if (sent !== undefined) rttEma = rttEma ? rttEma * 0.9 + (now - sent) * 0.1 : now - sent;
      for (const seq of sentAt.keys()) if (seq <= ackseq) sentAt.delete(seq);
    }

    const held = { left: false, right: false, up: false, down: false };
    const keyMap = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };

    // Fixed-rate loop: predict locally and send the same input to the server.
    setInterval(() => {
      if (ws.readyState !== WebSocket.OPEN) return;
      const dx = (held.right ? 1 : 0) - (held.left ? 1 : 0);
      const dy = (held.down ? 1 : 0) - (held.up ? 1 : 0);
      const seq = seq_counter++;
      if (dx || dy) pending.set(seq, { dx, dy }); // no-op inputs need no replay
      sentAt.set(seq, performance.now());

      if (localState) {
        const r = (world[myId] && world[myId].r) || RADIUS;
        localState.x = clamp(localState.x + dx * SPEED * DT, r, ARENA_W - r);
        localState.y = clamp(localState.y + dy * SPEED * DT, r, ARENA_H - r);
      }

      const bytes = encode({ dx, dy, seq, tick: lastServerTick });
      const delay = LAG_MS + (JITTER_MS ? Math.random() * JITTER_MS : 0);
      if (delay > 0) setTimeout(() => ws.readyState === WebSocket.OPEN && ws.send(bytes), delay);
      else ws.send(bytes);
    }, TICK_MS);

    function reconcile(me) {
      for (const seq of pending.keys()) if (seq <= me.ackseq) pending.delete(seq);

      let x = me.x, y = me.y;
      for (const inp of pending.values()) {
        x = clamp(x + inp.dx * SPEED * DT, RADIUS, ARENA_W - RADIUS);
        y = clamp(y + inp.dy * SPEED * DT, RADIUS, ARENA_H - RADIUS);
      }

      if (!localState) { localState = { x, y }; return; }
      lastCorrection = Math.hypot(x - localState.x, y - localState.y);
      localState.x = x;
      localState.y = y;
    }

    // Remote position at renderTime: lerp between the two bracketing samples, or
    // dead-reckon from the last sample's velocity if we've run past it.
    function interpolate(buf, renderTime) {
      const last = buf[buf.length - 1];
      if (renderTime <= buf[0].t) return { x: buf[0].x, y: buf[0].y };
      if (renderTime >= last.t) {
        const dt = Math.min(renderTime - last.t, 250) / 1000;
        return {
          x: clamp(last.x + last.vx * dt, RADIUS, ARENA_W - RADIUS),
          y: clamp(last.y + last.vy * dt, RADIUS, ARENA_H - RADIUS),
        };
      }
      for (let i = 0; i < buf.length - 1; i++) {
        if (buf[i].t <= renderTime && renderTime <= buf[i + 1].t) {
          const s0 = buf[i], s1 = buf[i + 1];
          const a = (renderTime - s0.t) / (s1.t - s0.t || 1);
          return { x: s0.x + (s1.x - s0.x) * a, y: s0.y + (s1.y - s0.y) * a };
        }
      }
      return { x: last.x, y: last.y };
    }

    function signal(x, y, r, color) {
      ctx.save();
      ctx.shadowColor = color; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
      ctx.restore();
    }
    function ring(x, y, r, color) {
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.lineWidth = 1.5; ctx.strokeStyle = color; ctx.stroke();
    }

    function graticule() {
      ctx.fillStyle = COL.scope; ctx.fillRect(0, 0, W, H);
      ctx.lineWidth = 1; ctx.strokeStyle = COL.grid; ctx.beginPath();
      for (let x = 100; x < W; x += 100) { ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, H); }
      for (let y = 100; y < H; y += 100) { ctx.moveTo(0, y + 0.5); ctx.lineTo(W, y + 0.5); }
      ctx.stroke();
      ctx.strokeStyle = COL.gridMaj; ctx.beginPath();
      ctx.moveTo(W / 2 + 0.5, 0); ctx.lineTo(W / 2 + 0.5, H);
      ctx.moveTo(0, H / 2 + 0.5); ctx.lineTo(W, H / 2 + 0.5);
      ctx.stroke();
    }

    function draw() {
      graticule();
      const renderTime = performance.now() - INTERP_DELAY;

      let bufDepth = 0;
      for (const id in world) {
        if (id === myId) continue;
        const p = world[id];
        if (!p.r) continue; // dead / respawning
        const buf = history[id];
        if (!buf || buf.length === 0) continue;
        bufDepth = buf.length;
        const pos = interpolate(buf, renderTime);
        signal(pos.x, pos.y, p.r, COL.rem);
      }

      const me = world[myId];
      let drift = "—";
      if (me && me.r) {
        if (localState) {
          const d = Math.hypot(localState.x - me.x, localState.y - me.y);
          drift = d.toFixed(1);
          if (d > 1.2) { // the error vector — prediction drift, drawn as a measured trace
            ctx.save();
            ctx.strokeStyle = COL.dim; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(localState.x, localState.y); ctx.lineTo(me.x, me.y); ctx.stroke();
            ctx.restore();
          }
        }
        ring(me.x, me.y, me.r, COL.srv);                              // server truth (ghost)
        if (localState) signal(localState.x, localState.y, me.r, COL.you); // predicted (you)
      }

      updateUI(me, drift, bufDepth);
      requestAnimationFrame(draw);
    }

    function updateUI(me, drift, bufDepth) {
      ui.rtt.textContent = rttEma ? rttEma.toFixed(0) : "—";
      ui.drift.textContent = drift;
      ui.corr.textContent = lastCorrection.toFixed(1);
      ui.buf.textContent = bufDepth;

      let you = 0, opp = 0;
      for (const id in world) { if (id === myId) you = world[id].score || 0; else opp = world[id].score || 0; }
      ui.scYou.textContent = you;
      ui.scOpp.textContent = opp;

      if (me && me.respawn && me.respawn > lastServerTick) {
        ui.overlay.hidden = false;
        ui.overlaySub.textContent = "reacquiring in " + Math.ceil((me.respawn - lastServerTick) / 20) + "s";
      } else {
        ui.overlay.hidden = true;
      }
    }

    requestAnimationFrame(draw);

    window.addEventListener("keydown", (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault();
      held[dir] = true;
    });

    window.addEventListener("keyup", (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault();
      held[dir] = false;
    });

    function releaseAll() { for (const k in held) held[k] = false; }
    window.addEventListener("blur", releaseAll);
    document.addEventListener("visibilitychange", () => { if (document.hidden) releaseAll(); });
  </script>
</body>
</html>
