<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gonet client</title>
  <style>
    body { margin: 0; background: #111; display: grid; place-items: center; height: 100vh; }
    canvas { background: #1d1d1d; border: 1px solid #444; }
  </style>
</head>
<body>
  <canvas id="game" width="600" height="400"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let seq_counter = 0;   // monotonic input sequence number
    let lastServerTick = 0; // most recent tick_id we've seen in a snapshot

    let players = [];

    const ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => console.log("connected");
    ws.onclose = (e) => console.log("disconnected", e.code, e.reason);
    ws.onerror = (e) => console.log("error", e);

    ws.onmessage = (event) => {
      const snapshot = JSON.parse(event.data);
      players = snapshot.players || [];
      lastServerTick = snapshot.tick_id || 0; // remember it so inputs can stamp it
      draw(); // redraw whenever fresh state arrives
    };

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const p of players) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
        ctx.fillStyle = "#4caf50";
        ctx.fill();
      }
    }


   
    const held = { left: false, right: false, up: false, down: false };

    const keyMap = {
      ArrowLeft: "left",
      ArrowRight: "right",
      ArrowUp: "up",
      ArrowDown: "down",
    };

    const TICK_MS = 50; // must match the server tick rate


    setInterval(() => {
      if (ws.readyState !== WebSocket.OPEN) return;
      const dx = (held.right ? 1 : 0) - (held.left ? 1 : 0);
      const dy = (held.down ? 1 : 0) - (held.up ? 1 : 0);
      ws.send(JSON.stringify({
        dx, dy,
        seq: seq_counter++,
        tick: lastServerTick,
      }));
    }, TICK_MS);

    window.addEventListener("keydown", (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault(); // stop arrow keys from scrolling the page
      held[dir] = true;
    });

    window.addEventListener("keyup", (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault();
      held[dir] = false;
    });
  </script>
</body>
</html>
