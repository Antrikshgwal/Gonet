<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gonet client</title>
  <style>
    body { margin: 0; background: #111; display: grid; place-items: center; height: 100vh; }
    canvas { background: #1d1d1d; border: 1px solid #444; }
  </style>
</head>
<body>
  <canvas id="game" width="600" height="400"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    // Latest snapshot received from the server. Starts empty so draw()
    // is safe to call before the first message arrives.
    let players = [];

    const ws = new WebSocket("ws://localhost:8080/");

    ws.onopen = () => console.log("connected");
    ws.onclose = (e) => console.log("disconnected", e.code, e.reason);
    ws.onerror = (e) => console.log("error", e);

    ws.onmessage = (event) => {
      const snapshot = JSON.parse(event.data);
      players = snapshot.players || [];
      draw(); // redraw whenever fresh state arrives
    };

    function draw() {
      // Canvas is stateless: wipe everything, then repaint every player
      // at its current position. Skip the clear and you get smears.
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const p of players) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
        ctx.fillStyle = "#4caf50";
        ctx.fill();
      }
    }

   
    // Track which arrow keys are currently held, derive a direction vector,
    // and only send to the server when that vector actually changes.
    const held = { left: false, right: false, up: false, down: false };
    let lastSent = { dx: 0, dy: 0 };

    const keyMap = {
      ArrowLeft: "left",
      ArrowRight: "right",
      ArrowUp: "up",
      ArrowDown: "down",
    };

    function sendInputIfChanged() {
      const dx = (held.right ? 1 : 0) - (held.left ? 1 : 0);
      const dy = (held.down ? 1 : 0) - (held.up ? 1 : 0);
      if (dx === lastSent.dx && dy === lastSent.dy) return;
      lastSent = { dx, dy };
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ dx, dy }));
      }
    }

    window.addEventListener("keydown", (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault(); // stop arrow keys from scrolling the page
      held[dir] = true;
      sendInputIfChanged();
    });

    window.addEventListener("keyup", (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault();
      held[dir] = false;
      sendInputIfChanged();
    });
  </script>
</body>
</html>
