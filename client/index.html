<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gonet client</title>
  <style>
    body { margin: 0; background: #111; display: grid; place-items: center; height: 100vh; }
    canvas { background: #1d1d1d; border: 1px solid #444; }
  </style>
</head>
<body>
  <canvas id="game" width="1000" height="600"></canvas>

  <script type="module">
    import { encode, decode } from "./msgpack.js";

    // Physics constants — must match the server exactly, or prediction drifts.
    const SPEED = 200, TICK_MS = 50, DT = TICK_MS / 1000;
    const ARENA_W = 1000, ARENA_H = 600, RADIUS = 10;
    const clamp = (v, lo, hi) => (v < lo ? lo : v > hi ? hi : v);

    // ?lag=200 injects one-way send latency; ?jitter=100 randomizes it.
    const params = new URLSearchParams(location.search);
    const LAG_MS = Number(params.get("lag")) || 0;
    const JITTER_MS = Number(params.get("jitter")) || 0;
    const INTERP_DELAY = 150; // render remotes this far in the past, between snapshots
    const DEBUG = true;

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let myId = null;            // our own player id, learned from the welcome message
    let localState = null;      // predicted position of our player
    let seq_counter = 1;        // starts at 1 so server AckSeq=0 means "nothing acked"
    let lastServerTick = 0;
    let lastAppliedTick = 0;    // newest snapshot reconciled against; drops stale ones
    let lastCorrection = 0;     // size of the last reconciliation snap (for the HUD)
    let rttEma = 0;             // smoothed round-trip time
    const pending = new Map();  // seq -> {dx, dy}, replayed during reconciliation
    const sentAt = new Map();   // seq -> send time, for RTT measurement
    const world = {};           // id -> authoritative player state from snapshots
    const history = {};         // id -> [{t, x, y, vx, vy}] samples for interpolation

    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.binaryType = "arraybuffer";
    ws.onopen = () => console.log("connected");
    ws.onclose = (e) => console.log("disconnected", e.code, e.reason);
    ws.onerror = (e) => console.log("error", e);

    ws.onmessage = (event) => {
      const msg = decode(new Uint8Array(event.data));
      if (msg.you !== undefined) { myId = msg.you; return; }

      if (msg.tick_id !== undefined) lastServerTick = msg.tick_id;
      const now = performance.now();
      for (const pd of msg.players || []) {
        const p = world[pd.id] = Object.assign(world[pd.id] || {}, pd);
        recordSample(pd.id, p, now);
      }
      for (const id of msg.removed || []) { delete world[id]; delete history[id]; }

      const me = world[myId];
      if (me && msg.tick_id > lastAppliedTick) {
        lastAppliedTick = msg.tick_id;
        updateRtt(me.ackseq, now);
        reconcile(me);
      }
    };

    function recordSample(id, p, t) {
      const buf = history[id] || (history[id] = []);
      buf.push({ t, x: p.x, y: p.y, vx: p.vx || 0, vy: p.vy || 0 });
      while (buf.length > 2 && buf[1].t < t - 1000) buf.shift(); // keep ~1s of history
    }

    function updateRtt(ackseq, now) {
      const sent = sentAt.get(ackseq);
      if (sent !== undefined) rttEma = rttEma ? rttEma * 0.9 + (now - sent) * 0.1 : now - sent;
      for (const seq of sentAt.keys()) if (seq <= ackseq) sentAt.delete(seq);
    }

    const held = { left: false, right: false, up: false, down: false };
    const keyMap = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };

    // Fixed-rate loop: predict locally and send the same input to the server.
    setInterval(() => {
      if (ws.readyState !== WebSocket.OPEN) return;
      const dx = (held.right ? 1 : 0) - (held.left ? 1 : 0);
      const dy = (held.down ? 1 : 0) - (held.up ? 1 : 0);
      const seq = seq_counter++;
      if (dx || dy) pending.set(seq, { dx, dy }); // no-op inputs need no replay
      sentAt.set(seq, performance.now());

      if (localState) {
        const r = (world[myId] && world[myId].r) || RADIUS;
        localState.x = clamp(localState.x + dx * SPEED * DT, r, ARENA_W - r);
        localState.y = clamp(localState.y + dy * SPEED * DT, r, ARENA_H - r);
      }

      const bytes = encode({ dx, dy, seq, tick: lastServerTick });
      const delay = LAG_MS + (JITTER_MS ? Math.random() * JITTER_MS : 0);
      if (delay > 0) setTimeout(() => ws.readyState === WebSocket.OPEN && ws.send(bytes), delay);
      else ws.send(bytes);
    }, TICK_MS);

    function reconcile(me) {
      for (const seq of pending.keys()) if (seq <= me.ackseq) pending.delete(seq);

      let x = me.x, y = me.y;
      for (const inp of pending.values()) {
        x = clamp(x + inp.dx * SPEED * DT, RADIUS, ARENA_W - RADIUS);
        y = clamp(y + inp.dy * SPEED * DT, RADIUS, ARENA_H - RADIUS);
      }

      if (!localState) { localState = { x, y }; return; }
      lastCorrection = Math.hypot(x - localState.x, y - localState.y);
      localState.x = x;
      localState.y = y;
    }

    // Remote position at renderTime: lerp between the two bracketing samples, or
    // dead-reckon from the last sample's velocity if we've run past it.
    function interpolate(buf, renderTime) {
      const last = buf[buf.length - 1];
      if (renderTime <= buf[0].t) return { x: buf[0].x, y: buf[0].y };
      if (renderTime >= last.t) {
        const dt = Math.min(renderTime - last.t, 250) / 1000;
        return {
          x: clamp(last.x + last.vx * dt, RADIUS, ARENA_W - RADIUS),
          y: clamp(last.y + last.vy * dt, RADIUS, ARENA_H - RADIUS),
        };
      }
      for (let i = 0; i < buf.length - 1; i++) {
        if (buf[i].t <= renderTime && renderTime <= buf[i + 1].t) {
          const s0 = buf[i], s1 = buf[i + 1];
          const a = (renderTime - s0.t) / (s1.t - s0.t || 1);
          return { x: s0.x + (s1.x - s0.x) * a, y: s0.y + (s1.y - s0.y) * a };
        }
      }
      return { x: last.x, y: last.y };
    }

    function dot(x, y, r, color, fill) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      if (fill) { ctx.fillStyle = color; ctx.fill(); }
      else { ctx.lineWidth = 2; ctx.strokeStyle = color; ctx.stroke(); }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const renderTime = performance.now() - INTERP_DELAY;

      let bufDepth = 0;
      for (const id in world) {
        if (id === myId) continue;
        const p = world[id];
        if (!p.r) continue; // dead / respawning
        const buf = history[id];
        if (!buf || buf.length === 0) continue;
        bufDepth = buf.length;
        const pos = interpolate(buf, renderTime);
        dot(pos.x, pos.y, p.r, "#4f8cff", true);
      }

      const me = world[myId];
      if (me && me.r) {
        if (DEBUG) dot(me.x, me.y, me.r, "#ffd166", false);              // server's view of us
        if (localState) dot(localState.x, localState.y, me.r, "#4caf50", true); // predicted
      }

      drawScores();
      if (me && me.respawn && me.respawn > lastServerTick) {
        const secs = Math.ceil((me.respawn - lastServerTick) / 20);
        ctx.fillStyle = "#ff6b6b";
        ctx.font = "28px monospace";
        ctx.textAlign = "center";
        ctx.fillText(`Respawning in ${secs}…`, canvas.width / 2, canvas.height / 2);
        ctx.textAlign = "left";
      }

      if (DEBUG) {
        const drift = me && localState && me.r ? Math.hypot(localState.x - me.x, localState.y - me.y).toFixed(1) : "-";
        ctx.fillStyle = "#aaa";
        ctx.font = "12px monospace";
        ctx.fillText(`lag=${LAG_MS}ms jitter=${JITTER_MS}ms  pending=${pending.size}  drift=${drift}px  corr=${lastCorrection.toFixed(2)}px`, 10, 18);
        ctx.fillText(`rtt=${rttEma.toFixed(0)}ms  interp=${INTERP_DELAY}ms  buf=${bufDepth}`, 10, 34);
        ctx.fillText("green = predicted   yellow = server   blue = remote (interpolated)", 10, 50);
      }
    }

    function drawScores() {
      const parts = [];
      for (const id in world) parts.push(`${id === myId ? "you" : "opp"} ${world[id].score || 0}`);
      ctx.fillStyle = "#fff";
      ctx.font = "16px monospace";
      ctx.textAlign = "center";
      ctx.fillText(parts.join("      "), canvas.width / 2, 26);
      ctx.textAlign = "left";
    }

    (function frame() { draw(); requestAnimationFrame(frame); })();

    window.addEventListener("keydown", (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault();
      held[dir] = true;
    });

    window.addEventListener("keyup", (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault();
      held[dir] = false;
    });

    function releaseAll() { for (const k in held) held[k] = false; }
    window.addEventListener("blur", releaseAll);
    document.addEventListener("visibilitychange", () => { if (document.hidden) releaseAll(); });
  </script>
</body>
</html>
